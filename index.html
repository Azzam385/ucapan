<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tantangan Dulu 🎁</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
margin:0;
font-family:'Poppins',sans-serif;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
color:white;
}

.box {
background: rgba(255,255,255,0.2);
padding:30px;
border-radius:20px;
width:300px;
}

input {
padding:10px;
border:none;
border-radius:10px;
width:80%;
margin-top:15px;
}

button {
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:20px;
background:white;
cursor:pointer;
}

</style>

</head>

<body>

<!-- AUDIO -->

<audio id="musik" loop>
<source src="musik.mp3" type="audio/mpeg">
</audio>

<div class="box">

<h2>Teka-Teki Masuk 🎁</h2>

<p>
Jawab soal ini dulu ya 😜<br><br>

<b>7 × 6 − 10 = ?</b>

</p>

<input type="number" id="jawab" placeholder="Jawaban">

<br>

<button onclick="cek()">Masuk</button>

<p id="salah"></p>

</div>

<script>

var audio = document.getElementById("musik");

/* PLAY MUSIK SAAT DISENTUH */

document.body.addEventListener("click", function(){

audio.play();

});

/* CEK JAWABAN */

function cek(){

var isi = document.getElementById("jawab").value;

if(isi == "32"){

/* SIMPAN POSISI MUSIK */

localStorage.setItem(
"musikTime",
audio.currentTime
);

window.location.href = "main.html";

}else{

document.getElementById("salah").innerHTML =
"Salah 😜 coba lagi";

}

}

</script>

</body>
</html>
